<!DOCTYPE html>
<html lang="en"
      data-default-theme="minimal"
      data-theme-lock="minimal"
      data-default-mode="light"
      data-default-brand="#0ea5e9">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regex Tester</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/themes/minimal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.css">
    <script defer src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tool-mono { font-family: 'JetBrains Mono', monospace; }

        .tool-stack { display: grid; gap: var(--crusher-spacing-6); max-width: 42rem; margin-inline: auto; }
        .tool-section { padding: var(--crusher-spacing-6); display: grid; gap: var(--crusher-spacing-4); }
        .tool-label { display: block; margin-bottom: var(--crusher-spacing-1); font-size: var(--crusher-font-size-sm); color: var(--crusher-text-secondary); }
        .tool-flags { display: flex; flex-wrap: wrap; gap: var(--crusher-spacing-4); }
        .tool-flag { display: inline-flex; align-items: center; gap: var(--crusher-spacing-2); color: var(--crusher-text-primary); font-size: var(--crusher-font-size-sm); cursor: pointer; }
        .tool-flag input { accent-color: var(--crusher-color-brand-primary); }
        textarea.crusher-tool-control { min-block-size: 6rem; padding: var(--crusher-spacing-3); }
        input[type="text"].crusher-tool-control { padding: var(--crusher-spacing-2) var(--crusher-spacing-3); }

        .tool-results {
            padding: var(--crusher-spacing-3);
            border-radius: var(--crusher-radius-md);
            border: 1px solid var(--crusher-border-primary);
            background: var(--crusher-background-muted);
            color: var(--crusher-text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: var(--crusher-font-size-sm);
            white-space: pre-wrap;
        }
        .tool-results-label { color: var(--crusher-color-brand-primary); font-weight: 700; }
        .highlight {
            background: color-mix(in srgb, var(--crusher-color-brand-primary) 22%, transparent);
            color: var(--crusher-text-primary);
            border-radius: var(--crusher-radius-sm);
            padding: 0 0.15em;
        }
    </style>
</head>
<body class="crusher-tool-page">

    <main class="crusher-tool-shell">
        <header class="crusher-tool-header">
            <h1 class="crusher-tool-title">Regex Tester</h1>
            <p class="crusher-tool-lede">Test regular expressions in real-time.</p>
        </header>

        <div class="tool-stack">
            <section class="crusher-tool-surface tool-section">
                <div>
                    <label for="pattern" class="tool-label">Regex Pattern</label>
                    <input type="text" id="pattern" class="crusher-tool-control tool-mono" placeholder="/[a-z]+/i">
                </div>
                <div class="tool-flags">
                    <label class="tool-flag"><input type="checkbox" id="g" checked><span>Global (g)</span></label>
                    <label class="tool-flag"><input type="checkbox" id="i"><span>Case-insensitive (i)</span></label>
                    <label class="tool-flag"><input type="checkbox" id="m"><span>Multiline (m)</span></label>
                </div>
                <div>
                    <label for="test-string" class="tool-label">Test String</label>
                    <textarea id="test-string" rows="4" class="crusher-tool-control tool-mono">The quick brown fox jumps over the lazy dog.</textarea>
                </div>
                <div id="results" class="tool-results"></div>
            </section>
        </div>
    </main>

    <a href="https://tools.muhammadhassaanjaved.com/" id="hub-bubble" class="crusher-tool-fab" title="View All Tools" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
    </a>

    <crusher-style-switcher
      default-theme="minimal"
      default-brand="#0ea5e9"
      hide-themes
      hide-theme-color></crusher-style-switcher>
    <script type="module" src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.standalone.esm.js"></script>

    <script>
        const patternInput = document.getElementById('pattern');
        const testString = document.getElementById('test-string');
        const results = document.getElementById('results');
        const flags = ['g', 'i', 'm'].filter(f => document.getElementById(f).checked).join('');

        function run() {
            try {
                const pat = new RegExp(patternInput.value || '.*', flags);
                const matches = testString.value.match(pat);
                if (matches) {
                    const label = document.createElement('span');
                    label.className = 'tool-results-label';
                    label.textContent = 'Matches:';
                    results.replaceChildren(label, document.createTextNode(' ' + matches.join(', ')));
                } else {
                    results.textContent = 'No matches';
                }
            } catch(e) {
                results.textContent = 'Invalid Regex';
            }
        }

        patternInput.addEventListener('input', run);
        testString.addEventListener('input', run);
        ['g','i','m'].forEach(f => document.getElementById(f).addEventListener('change', run));
        run();
    </script>
</body>
</html>
